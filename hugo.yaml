          weight: 3
        - identifier: events-participated
          name: Sự kiện đã tham gia
          title: Sự kiện đã tham gia
          url: /vi/events-participated
          weight: 4
        - identifier: workshop
          name: Workshop
          title: Workshop
          url: /vi/workshop
          weight: 5
        - identifier: self-evaluation
